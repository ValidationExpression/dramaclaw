# DramaClaw CE — 内置 newapi 自建网关版(无需 DC key)。
# 跑法:docker compose -f docker-compose.selfhosted.yml up -d --build
# 三服务:api + 内置 newapi 网关(:3000)+ web(:8080)。api 与 newapi 共享 SQLite
# 数据卷，首次启动可直接在 DramaClaw 的“本地 NewAPI”页完成初始化。
# 想改用「官方 DC key」路径(更简单、填一个 key 即用):改用默认 docker-compose.yml。
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      # 默认精简镜像。要 3DGS/SHARP「world」特性(torch/gsplat/sharp/da2 + SOG 工具):
      #   INSTALL_WORLD=1 docker compose up --build
      # 注:权重运行时下载不入镜像;slim base 为 CPU,GPU 加速需 CUDA base;Mac Docker 无 GPU。
      args:
        INSTALL_WORLD: "${INSTALL_WORLD:-0}"
    # 运行时从宿主 .env 注入 model/LLM key（.env 不进镜像，由 .dockerignore 排除）。
    # environment: 块仍覆盖此处同名变量，保持 CE inline 模式强制不变。
    env_file:
      - .env
    environment:
      ST_EDITION: ce
      ST_CONTROL_PLANE_DSN: ""
      ST_REDIS_URL: ""
      ST_CELERY_BROKER_URL: ""
      ST_CELERY_RESULT_BACKEND: ""
      NOVELVIDEO_DATA_ROOT: /data
      NOVELVIDEO_STATE_DIR: /data/state
      DRAMACLAW_CHAT_BACKEND: hermes
      HERMES_CLI_PATH: /root/.local/bin/hermes
      # 内置 newapi 网关：后端服务端调用走容器内网，覆盖 .env 里的外部网关地址，
      # 让整套自包含、开箱即跑。要 BYO 自己的 OpenAI 兼容网关：删掉下面两行，
      # 改在 .env 里填 NEWAPI_BASE_URL / NEWAPI_API_KEY。
      NEWAPI_BASE_URL: http://newapi:3000/v1
      NEWAPI_ADMIN_BASE_URL: http://newapi:3000
      NEWAPI_SQL_DSN: local
      NEWAPI_SQLITE_PATH: /newapi-data/one-api.db
      NEWAPI_ADMIN_USERNAME: root
      NEWAPI_PROVISIONER_ENABLED: "true"
    # 宿主发布端口可配，便于一机多套（每套换 ST_API_PORT + 换 -p 项目名）。
    # 冒号右侧 8780 是容器内端口，固定不变（web 经内部网络访问它）。
    ports:
      - "${ST_API_PORT:-8780}:8780"
    volumes:
      - ce-data:/data
      - newapi-data:/newapi-data
    depends_on:
      - newapi

  # 内置 newAPI 网关（OpenAI 兼容）。默认使用 newapi-data 卷里的 SQLite；DramaClaw
  # 通过共享卷自动初始化管理员、运行令牌、渠道与模型映射。
  newapi:
    image: calciumion/new-api:v1.0.0-rc.15
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      # CE 固定使用内置 SQLite（/data/one-api.db）。
      SQL_DSN: ""
    # 一机多套时换 ST_NEWAPI_PORT；冒号右侧 3000 是容器内端口，固定不变。
    ports:
      - "${ST_NEWAPI_PORT:-3000}:3000"
    volumes:
      - newapi-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/status >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # SPA served by nginx, reverse-proxying /api + /static to the api service.
  # The Dockerfile's BACKEND_HOST/PORT defaults target the EE/Helm deploy; here
  # they are overridden to the compose `api` service (internal port 8780). Open
  # the app at http://localhost:8080 — the browser only ever talks to web.
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_HOST: api
      BACKEND_PORT: "8780"
    # 浏览器打开的就是这个端口（默认 8080）。一机多套时换 ST_WEB_PORT。
    ports:
      - "${ST_WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  ce-data:
  newapi-data:
