# DramaClaw CE — 官方 release 镜像版(不本地构建):内置 newapi 自建网关(无需 DC key)。
# 跑法:docker compose -f docker-compose.selfhosted.release.yml up -d
# 与 docker-compose.selfhosted.yml 服务结构一致,区别仅在镜像来自 Docker Hub release
# (每次 GitHub Release 自动发布),无需 clone 源码即可运行。
# 三服务:api + 内置 newapi 网关(:3000)+ web(:8080)。首启后到 http://localhost:3000
# 注册管理员、配上游渠道与令牌,再把令牌填回 .env 的 NEWAPI_API_KEY 并重启 api。
# 版本固定:.env 或环境变量设 DRAMACLAW_VERSION=1.0.1(默认 latest,跟随最新 release)。
# 注:release 镜像为精简版,不含 3DGS/SHARP「world」特性;要 world 请用源码
#   INSTALL_WORLD=1 docker compose -f docker-compose.selfhosted.yml up --build。
services:
  api:
    image: claymorelab/dramaclaw:${DRAMACLAW_VERSION:-latest}
    # 运行时从宿主 .env 注入 model/LLM key;镜像版允许没有 .env(首启后再补也行)。
    # environment: 块仍覆盖此处同名变量,保持 CE inline 模式强制不变。
    env_file:
      - path: .env
        required: false
    environment:
      ST_EDITION: ce
      ST_CONTROL_PLANE_DSN: ""
      ST_REDIS_URL: ""
      ST_CELERY_BROKER_URL: ""
      ST_CELERY_RESULT_BACKEND: ""
      NOVELVIDEO_DATA_ROOT: /data
      NOVELVIDEO_STATE_DIR: /data/state
      DRAMACLAW_CHAT_BACKEND: hermes
      HERMES_CLI_PATH: /root/.local/bin/hermes
      # 内置 newapi 网关:后端服务端调用走容器内网,覆盖 .env 里的外部网关地址,
      # 让整套自包含、开箱即跑。要 BYO 自己的 OpenAI 兼容网关:删掉下面两行,
      # 改在 .env 里填 NEWAPI_BASE_URL / NEWAPI_API_KEY。
      NEWAPI_BASE_URL: http://newapi:3000/v1
      NEWAPI_ADMIN_BASE_URL: http://newapi:3000
      # 最小模式:不跑前端自动初始化向导,newapi 到 http://localhost:3000 手动配渠道/令牌。
      # 想要前端一键初始化(provisioner)需让 api 能读 newapi 的库,属更重的接法,见 README。
      NEWAPI_PROVISIONER_ENABLED: "false"
    # 宿主发布端口可配,便于一机多套(每套换 ST_API_PORT + 换 -p 项目名)。
    # 冒号右侧 8780 是容器内端口,固定不变(web 经内部网络访问它)。
    ports:
      - "${ST_API_PORT:-8780}:8780"
    volumes:
      - ce-data:/data
    depends_on:
      - newapi

  # 内置 newAPI 网关(OpenAI 兼容)。首启后到 http://localhost:3000 注册管理员、配上游
  # 渠道与令牌,再把令牌填回 .env 的 NEWAPI_API_KEY,`docker compose up -d` 重启 api 即可调通。
  # 默认用内置 SQLite(落在 newapi-data 卷),单机够用,无需 MySQL/Redis。
  newapi:
    image: calciumion/new-api:v1.0.0-rc.15
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      # 留空 = 内置 SQLite(/data/one-api.db)。要接 MySQL:改成 user:pass@tcp(host:3306)/db。
      SQL_DSN: ""
    # 一机多套时换 ST_NEWAPI_PORT;冒号右侧 3000 是容器内端口,固定不变。
    ports:
      - "${ST_NEWAPI_PORT:-3000}:3000"
    volumes:
      - newapi-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/status >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # SPA served by nginx, reverse-proxying /api + /static to the api service.
  # The image's BACKEND_HOST/PORT defaults target the EE/Helm deploy; here
  # they are overridden to the compose `api` service (internal port 8780). Open
  # the app at http://localhost:8080 — the browser only ever talks to web.
  web:
    image: claymorelab/dramaclaw-frontend:${DRAMACLAW_VERSION:-latest}
    environment:
      BACKEND_HOST: api
      BACKEND_PORT: "8780"
    # 浏览器打开的就是这个端口(默认 8080)。一机多套时换 ST_WEB_PORT。
    ports:
      - "${ST_WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  ce-data:
  newapi-data:
